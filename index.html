<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>松田亜利沙姫✨</title>
    <meta name="author" content="LTurret" />
    <link rel="shortcut icon" type="image/png" href="./asset/favicon.png" />
    <link rel="stylesheet" href="" />
  </head>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300&display=swap");

    .unselectable {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .removeCursor {
      cursor: default;
    }

    * {
      text-decoration: none;
      color: #393939;
      padding: 0;
      border: 0;
      margin: 0;
    }

    * h1 {
      font-size: 72px;
    }

    * p {
      font-size: 21px;
    }

    * a {
      font-size: 1.17em;
      font-weight: bold;
    }

    body {
      background-image: url("./asset/bg_light.jpg");
    }

    ::selection {
      background: #f7c130;
    }

    .main {
      padding-top: 10vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-family: "Zen Maru Gothic", sans-serif;
      letter-spacing: -3px;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      font-size: 72px;
      transition: all 0.5s ease;
    }

    h1:hover {
      letter-spacing: 0px;
      color: #b54461;
    }

    .main h3 {
      font-family: "Zen Maru Gothic", sans-serif;
      padding-left: 1.25rem;
      letter-spacing: 16px;
      text-align: center;
      transition: all 0.5s ease;
    }

    .main h3:hover {
      letter-spacing: 20px;
      color: #b54461;
    }

    h4 {
      font-family: "Zen Maru Gothic", sans-serif;
      font-size: 1.17rem;
      letter-spacing: 2px;
      text-align: center;
    }

    section.emoji p {
      font-family: "Hachi Maru Pop", cursive;
      transition: all 0.5s ease;
    }

    section.emoji p:hover {
      color: #b54461;
    }

    section.star {
      position: absolute;
      content: url("./asset/bg_kira_pc.png");
      position: absolute;
      left: 0px;
      top: 0px;
      height: 100%;
      z-index: -1;
    }

    .lyricTitle {
      cursor: pointer;
      font-family: "Zen Maru Gothic", sans-serif;
      font-size: 1.17em;
      margin-top: 5rem;
      text-align: center;
    }

    .lyricTitle a {
      transition: all 0.5s ease;
    }

    .lyricTitle a:hover {
      color: #b54461;
    }

    .lyrics {
      margin-top: 0.5rem;
      text-align: center;
    }

    p {
      font-family: "M PLUS Rounded 1c", sans-serif;
      letter-spacing: 2px;
      padding-top: 0.1rem;
    }
  </style>
  <body>
    <div class="main">
      <section class="emoji">
        <p class="unselectable removeCursor">⌒(*＞ｖ＜)b⌒</p>
      </section>
      <h1 class="unselectable removeCursor">松田亜利沙</h1>
      <h3 class="unselectable removeCursor">MATSUDA ARISA</h3>
      <div class="lyricTitle">
        <a
          class="unselectable"
          href="https://www.youtube.com/watch?v=gktBksCeoRk&pp=ygUh44Ki44Kk44OJ44Or44Gv44CB44GL44GP6Kqe44KK44GN"
        >
          ～ アイドルちゃんのいいところ7選 ～
        </a>
      </div>
      <div class="lyrics">
        <p>いち、かわいくて💖</p>
        <p>に、かっこよくて✨</p>
        <p>さん、努力家で🔥</p>
        <p>よん、個性豊か📸</p>
        <p>ご、あざとくてもいい💢</p>
        <p>ろく、自然体でもいい🎐</p>
        <p>なな、生きてれば存在が優勝😭🙏❗❗</p>
      </div>
    </div>
    <section class="star"></section>
  </body>
  <script>
    window.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });
  </script>
</html>
